<form class="space-y-6" aria-label="Report composition form">
  <div>
    <label class="label-text">Report Type</label>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-1">
      <label
        class="card flex items-center gap-3 p-4 cursor-pointer border-accent/50 bg-accent/5"
      >
        <input
          type="radio"
          name="report-type"
          value="progress"
          class="accent-accent scale-125"
          checked
        />
        <div>
          <p class="text-sm font-medium text-text-primary">Progress Report</p>
          <p class="text-xs text-text-muted">
            Track milestones and deliverables
          </p>
        </div>
      </label>
      <label class="card flex items-center gap-3 p-4 cursor-pointer">
        <input
          type="radio"
          name="report-type"
          value="financial"
          class="accent-accent scale-125"
        />
        <div>
          <p class="text-sm font-medium text-text-primary">Financial Report</p>
          <p class="text-xs text-text-muted">Revenue, costs, and forecasts</p>
        </div>
      </label>
    </div>
  </div>

  <div>
    <label for="report-purpose" class="label-text">Purpose</label>
    <textarea
      id="report-purpose"
      rows="7"
      class="textarea-field resize-none"
      placeholder="Describe the report purpose"
    >
Monthly progress report for the Enterprise AI Platform rollout, covering engineering milestones, adoption metrics, and blockers for leadership review.</textarea
    >
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
    <div>
      <label for="report-period" class="label-text">Report Period</label>
      <input
        type="text"
        id="report-period"
        class="input-field"
        value="June 1 – June 30, 2026"
      />
    </div>
    <div>
      <label for="report-audience" class="label-text">Audience</label>
      <select id="report-audience" class="select-field">
        <option value="leadership" selected>Executive Leadership</option>
        <option value="management">Department Management</option>
        <option value="team">Project Team</option>
        <option value="stakeholders">External Stakeholders</option>
      </select>
    </div>
  </div>

  <div>
    <label for="report-context" class="label-text">Additional Context</label>
    <textarea
      id="report-context"
      rows="7"
      class="textarea-field resize-none"
      placeholder="Any additional context"
    >
Focus on the Document QA and File Storage modules. Include adoption numbers from the pilot group of 45 users across 3 departments.</textarea
    >
  </div>

  <div>
    <label class="label-text">Attach Documents</label>
    <div class="card border-dashed p-6 text-center">
      <i
        data-lucide="upload-cloud"
        class="h-8 w-8 text-text-muted mx-auto mb-3"
      ></i>
      <p class="text-sm text-text-secondary mb-1">
        Drag and drop files here, or click to browse
      </p>
      <p class="text-xs text-text-muted">PDF, DOCX, XLSX up to 25 MB each</p>
      <button type="button" class="btn-secondary mt-4 text-sm">
        Browse Files
      </button>
    </div>
    <ul class="mt-3 space-y-2">
      <li class="flex items-center gap-3 card p-3">
        <i data-lucide="file-text" class="h-4 w-4 text-red-400"></i>
        <span class="text-sm text-text-primary flex-1 truncate"
          >Sprint-Velocity-June.xlsx</span
        >
        <span class="text-xs text-text-muted">245 KB</span>
        <button type="button" class="btn-ghost p-1" aria-label="Remove">
          <i data-lucide="x" class="h-4 w-4"></i>
        </button>
      </li>
    </ul>
  </div>

  <div>
    <label for="report-style" class="label-text">Writing Style</label>
    <select id="report-style" class="select-field">
      <option value="formal" selected>Formal — Board-ready language</option>
      <option value="professional">
        Professional — Standard business tone
      </option>
      <option value="concise">Concise — Bullet-heavy, minimal prose</option>
      <option value="detailed">Detailed — Comprehensive narrative</option>
    </select>
  </div>

  <div class="pt-2">
    <button type="button" class="btn-primary px-6">
      <i data-lucide="sparkles" class="h-4 w-4"></i>
      Generate Report
    </button>
  </div>
</form>
