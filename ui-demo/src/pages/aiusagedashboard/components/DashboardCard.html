<article class="card p-6">
  <div class="flex items-start justify-between mb-4">
    <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-bg-elevated border border-border-subtle">
      <i data-lucide="{{ICON}}" class="h-5 w-5 {{ICON_COLOR}}"></i>
    </div>
    <span class="badge {{TREND_CLASS}}">{{TREND}}</span>
  </div>
  <p class="text-sm text-text-muted mb-1">{{LABEL}}</p>
  <p class="text-2xl sm:text-3xl font-bold tracking-tight text-text-primary">{{VALUE}}</p>
  <p class="text-xs text-text-muted mt-2">{{SUBTEXT}}</p>
</article>
