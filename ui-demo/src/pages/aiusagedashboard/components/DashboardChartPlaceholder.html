<article class="card p-6">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h3 class="text-sm font-semibold text-text-primary">{{TITLE}}</h3>
      <p class="text-xs text-text-muted mt-0.5">{{SUBTITLE}}</p>
    </div>
    <button type="button" class="btn-ghost p-1.5" aria-label="Chart options">
      <i data-lucide="more-horizontal" class="h-4 w-4"></i>
    </button>
  </div>
  <div class="relative h-48 sm:h-56 flex items-end justify-between gap-1 px-2">
    <!-- Chart placeholder bars -->
    <div class="flex-1 flex flex-col items-center gap-2">
      <div class="w-full max-w-[32px] rounded-t bg-accent/20 hover:bg-accent/40 transition-colors" style="height: {{BAR1}}%"></div>
      <span class="text-[10px] text-text-muted">Mon</span>
    </div>
    <div class="flex-1 flex flex-col items-center gap-2">
      <div class="w-full max-w-[32px] rounded-t bg-accent/20 hover:bg-accent/40 transition-colors" style="height: {{BAR2}}%"></div>
      <span class="text-[10px] text-text-muted">Tue</span>
    </div>
    <div class="flex-1 flex flex-col items-center gap-2">
      <div class="w-full max-w-[32px] rounded-t bg-accent/20 hover:bg-accent/40 transition-colors" style="height: {{BAR3}}%"></div>
      <span class="text-[10px] text-text-muted">Wed</span>
    </div>
    <div class="flex-1 flex flex-col items-center gap-2">
      <div class="w-full max-w-[32px] rounded-t bg-accent hover:bg-accent-hover transition-colors" style="height: {{BAR4}}%"></div>
      <span class="text-[10px] text-text-muted">Thu</span>
    </div>
    <div class="flex-1 flex flex-col items-center gap-2">
      <div class="w-full max-w-[32px] rounded-t bg-accent/20 hover:bg-accent/40 transition-colors" style="height: {{BAR5}}%"></div>
      <span class="text-[10px] text-text-muted">Fri</span>
    </div>
    <div class="flex-1 flex flex-col items-center gap-2">
      <div class="w-full max-w-[32px] rounded-t bg-accent/20 hover:bg-accent/40 transition-colors" style="height: {{BAR6}}%"></div>
      <span class="text-[10px] text-text-muted">Sat</span>
    </div>
    <div class="flex-1 flex flex-col items-center gap-2">
      <div class="w-full max-w-[32px] rounded-t bg-accent/20 hover:bg-accent/40 transition-colors" style="height: {{BAR7}}%"></div>
      <span class="text-[10px] text-text-muted">Sun</span>
    </div>
  </div>
</article>
