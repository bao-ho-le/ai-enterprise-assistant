<div class="relative w-full max-w-3xl mx-auto">
  <div class="relative">
    <p class="mt-3 mb-2 flex items-center gap-1.5 text-xs text-text-muted">
      <i data-lucide="info" class="h-3.5 w-3.5"></i>
      Powered by vector embeddings — search by meaning, not just file names
    </p>

    <div
      class="flex h-12 items-center rounded-lg border border-border-subtle bg-bg-card px-5"
    >
      <input
        type="search"
        placeholder="Ex: Q4 revenue projections for enterprise clients"
        class="flex-1 bg-transparent text-sm text-text-primary outline-none placeholder:text-text-muted"

      />

      <i data-lucide="search" class="h-5 w-5 text-text-muted ml-3"></i>
    </div>
  </div>
</div>
