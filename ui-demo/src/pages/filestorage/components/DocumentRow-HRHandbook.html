<tr
  class="border-b border-border-subtle transition-colors hover:bg-bg-elevated/50"
>
  <td class="px-4 py-4">
    <input
      type="checkbox"
      class="h-4 w-4 rounded border-border-default bg-bg-primary accent-accent"
      aria-label="Select Employee-Handbook-2026.pdf"
    />
  </td>
  <td class="px-4 py-4">
    <div class="flex items-center gap-3">
      <span
        class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-red-500/10"
      >
        <i data-lucide="book-open" class="h-4 w-4 text-red-400"></i>
      </span>

      <div class="min-w-0">
        <p class="text-sm font-medium text-text-primary truncate">
          Employee-Handbook-2026.pdf
        </p>
        <p class="text-xs text-text-muted truncate">/hr/policies/</p>
      </div>
    </div>
  </td>

  <!-- Date -->
  <td class="px-4 py-4 text-sm text-text-secondary whitespace-nowrap">
    Jun 25, 2026 · 09:00
  </td>

  <!-- Type -->
  <td class="px-4 py-4">
    <span class="badge badge-neutral">Other</span>
  </td>

  <!-- Current Version -->
  <td class="px-4 py-4">
    <span class="text-sm text-text-secondary font-medium">v3</span>
  </td>

  <!-- Size -->
  <td class="px-4 py-4 text-sm text-text-secondary whitespace-nowrap">
    5.1 MB
  </td>

  <!-- Progress -->
  <td class="px-4 py-4">
    <div class="flex items-center gap-2">
      <div class="w-16 h-1.5 rounded-full bg-bg-elevated overflow-hidden">
        <div class="h-full rounded-full bg-accent" style="width: 45%"></div>
      </div>
      <span class="text-sm text-text-secondary">45%</span>
    </div>
  </td>

  <!-- Status -->
  <td class="px-4 py-4">
    <span class="badge badge-error">Failed</span>
  </td>

  <!-- Actions -->
  <td class="px-4 py-4">
    <div class="flex items-center gap-1">
      <button type="button" class="btn-ghost p-1.5" title="View Match">
        <i data-lucide="scan-search" class="h-4 w-4"></i>
        <span class="sr-only">View Match</span>
      </button>
      <button type="button" class="btn-ghost p-1.5" aria-label="Download">
        <i data-lucide="download" class="h-4 w-4"></i>
      </button>
      <div class="relative">
        <button
          type="button"
          class="btn-ghost p-1.5 action-menu-trigger"
          aria-label="More actions"
          data-dropdown="dropdown-hr"
        >
          <i data-lucide="more-horizontal" class="h-4 w-4"></i>
        </button>
        <div
          id="dropdown-hr"
          class="action-dropdown hidden absolute right-0 mt-1 w-48 rounded-lg border border-border-subtle bg-bg-card shadow-lg z-50"
        >
          <div class="py-1">
            <button
              type="button"
              class="flex items-center gap-2 w-full px-3 py-2 text-sm text-text-primary hover:bg-bg-elevated transition-colors"
            >
              <i data-lucide="file-text" class="h-4 w-4 text-text-muted"></i>
              Document Details
            </button>
            <button
              type="button"
              class="flex items-center gap-2 w-full px-3 py-2 text-sm text-text-primary hover:bg-bg-elevated transition-colors"
            >
              <i data-lucide="upload" class="h-4 w-4 text-text-muted"></i>
              Upload New Version
            </button>
            <button
              type="button"
              class="flex items-center gap-2 w-full px-3 py-2 text-sm text-text-primary hover:bg-bg-elevated transition-colors"
            >
              <i data-lucide="pencil" class="h-4 w-4 text-text-muted"></i>
              Rename
            </button>
            <button
              type="button"
              class="flex items-center gap-2 w-full px-3 py-2 text-sm text-error hover:bg-error/10 transition-colors"
            >
              <i data-lucide="trash-2" class="h-4 w-4"></i>
              Delete Document
            </button>
          </div>
        </div>
      </div>
    </div>
  </td>
</tr>
