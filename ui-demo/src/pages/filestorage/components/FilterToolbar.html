<div class="filter-toolbar mb-6">
  <div class="filter-toolbar-item filter-toolbar-item--compact">
    <label for="sort-order" class="text-xs text-text-muted whitespace-nowrap"
      >Sort</label
    >
    <select id="sort-order" class="select-field">
      <option value="newest">Newest</option>
      <option value="oldest">Oldest</option>
    </select>
  </div>

  <div class="filter-toolbar-item filter-toolbar-item--wide">
    <label for="doc-type" class="text-xs text-text-muted whitespace-nowrap"
      >Document Type</label
    >
    <select id="doc-type" class="select-field">
      <option value="">All Types</option>
      <option value="email">Email Template</option>
      <option value="report">Report</option>
      <option value="minutes">Meeting Minutes</option>
      <option value="other">Other</option>
    </select>
  </div>

  <div
    class="filter-toolbar-item filter-toolbar-item--compact filter-toolbar-item--xs"
  >
    <label for="extension" class="text-xs text-text-muted whitespace-nowrap"
      >Extension</label
    >
    <select id="extension" class="select-field">
      <option value="">All</option>
      <option value="pdf">PDF</option>
      <option value="docx">DOCX</option>
      <option value="xlsx">XLSX</option>
      <option value="txt">TXT</option>
    </select>
  </div>

  <div
    class="filter-toolbar-item filter-toolbar-item--wide filter-toolbar-item--date"
  >
    <span class="text-xs text-text-muted whitespace-nowrap">Upload Date</span>
    <div class="filter-toolbar-range">
      <input
        type="date"
        id="upload-date-from"
        class="input-field"
        value="2026-01-01"
      />
      <span class="filter-toolbar-range-separator" aria-hidden="true">-</span>
      <input type="date" id="upload-date-to" class="input-field" />
    </div>
  </div>

  <div class="filter-toolbar-item filter-toolbar-item--compact">
    <label for="file-size" class="text-xs text-text-muted whitespace-nowrap"
      >File Size</label
    >
    <select id="file-size" class="select-field">
      <option value="">Any Size</option>
      <option value="small">&lt; 1 MB</option>
      <option value="medium">1–10 MB</option>
      <option value="large">&gt; 10 MB</option>
    </select>
  </div>

  <div
    class="filter-toolbar-item filter-toolbar-item--compact filter-toolbar-item--xs"
  >
    <label for="similarity" class="text-xs text-text-muted whitespace-nowrap"
      >Similarity</label
    >
    <select id="similarity" class="select-field">
      <option value="">Any</option>
      <option value="high">&gt; 90%</option>
      <option value="medium">70–90%</option>
      <option value="low">&lt; 70%</option>
    </select>
  </div>

  <div class="filter-toolbar-item filter-toolbar-item--compact">
    <label for="status" class="text-xs text-text-muted whitespace-nowrap"
      >Status</label
    >
    <select id="status" class="select-field">
      <option value="">All</option>
      <option value="indexed">Indexed</option>
      <option value="processing">Processing</option>
      <option value="failed">Failed</option>
    </select>
  </div>
</div>
