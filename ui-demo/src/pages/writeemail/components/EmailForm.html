<form class="space-y-6" aria-label="Email composition form">
  <div>
    <label for="email-purpose" class="label-text">Purpose</label>
    <textarea
      id="email-purpose"
      rows="7"
      class="textarea-field resize-none"
      placeholder="Describe the purpose of this email — e.g. Follow up on Q4 partnership proposal with Acme Corp"
    >
Follow up on our Q4 partnership proposal with Acme Corp and confirm next steps for the integration timeline.</textarea
    >
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
    <div>
      <label for="email-sender" class="label-text">Sender</label>
      <input
        type="email"
        id="email-sender"
        class="input-field"
        value="nguyen.tran@company.com"
      />
    </div>
    <div>
      <label for="email-recipient" class="label-text">Recipient</label>
      <input
        type="email"
        id="email-recipient"
        class="input-field"
        value="sarah.chen@acmecorp.com"
      />
    </div>
  </div>

  <div>
    <label for="email-context" class="label-text">Optional Context</label>
    <textarea
      id="email-context"
      rows="7"
      class="textarea-field resize-none"
      placeholder="Additional context for the AI to consider"
    >
Previous meeting on June 28 discussed API integration scope. Sarah requested a written summary of deliverables and timeline by end of week.</textarea
    >
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
    <div>
      <label for="email-language" class="label-text">Language</label>
      <select id="email-language" class="select-field">
        <option value="en" selected>English</option>
        <option value="vi">Vietnamese</option>
      </select>
    </div>
    <div>
      <label for="email-length" class="label-text">Email Length</label>
      <select id="email-length" class="select-field">
        <option value="short">Short</option>
        <option value="medium" selected>Medium</option>
        <option value="long">Long</option>
      </select>
    </div>
    <div>
      <label for="email-audience" class="label-text">Audience</label>
      <select id="email-audience" class="select-field">
        <option value="customer" selected>Customer</option>
        <option value="employee">Employee</option>
        <option value="manager">Manager</option>
      </select>
    </div>
    <div>
      <label for="email-tone" class="label-text">Tone</label>
      <select id="email-tone" class="select-field">
        <option value="formal">Formal</option>
        <option value="professional" selected>Professional</option>
        <option value="friendly">Friendly</option>
        <option value="neutral">Neutral</option>
      </select>
    </div>
  </div>

  <div class="pt-2">
    <button type="button" class="btn-primary px-6">
      <i data-lucide="sparkles" class="h-4 w-4"></i>
      Generate Email
    </button>
  </div>
</form>
