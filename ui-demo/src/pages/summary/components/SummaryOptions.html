<form class="space-y-8" aria-label="Summary options">
  <div>
    <label class="label-text">Summary Type</label>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 mt-2">
      <label
        class="card flex items-center gap-3 p-4 cursor-pointer border-accent/50 bg-accent/5"
      >
        <input
          type="radio"
          name="summary-type"
          value="executive"
          class="accent-accent scale-125"
          checked
        />
        <div>
          <p class="text-sm font-medium text-text-primary">Executive Summary</p>
          <p class="text-xs text-text-muted mt-0.5">
            High-level overview for leadership
          </p>
        </div>
      </label>

      <label class="card flex items-center gap-3 p-4 cursor-pointer">
        <input
          type="radio"
          name="summary-type"
          value="bullet"
          class="accent-accent scale-125"
        />
        <div>
          <p class="text-sm font-medium text-text-primary">Bullet Summary</p>
          <p class="text-xs text-text-muted mt-0.5">
            Key points in scannable format
          </p>
        </div>
      </label>

      <label class="card flex items-center gap-3 p-4 cursor-pointer">
        <input
          type="radio"
          name="summary-type"
          value="detailed"
          class="accent-accent scale-125"
        />
        <div>
          <p class="text-sm font-medium text-text-primary">Detailed Summary</p>
          <p class="text-xs text-text-muted mt-0.5">
            Comprehensive section-by-section
          </p>
        </div>
      </label>

      <label class="card flex items-center gap-3 p-4 cursor-pointer">
        <input
          type="radio"
          name="summary-type"
          value="timeline"
          class="accent-accent scale-125"
        />
        <div>
          <p class="text-sm font-medium text-text-primary">Timeline</p>
          <p class="text-xs text-text-muted mt-0.5">
            Chronological event sequence
          </p>
        </div>
      </label>

      <label class="card flex items-center gap-3 p-4 cursor-pointer">
        <input
          type="radio"
          name="summary-type"
          value="actions"
          class="accent-accent scale-125"
        />
        <div>
          <p class="text-sm font-medium text-text-primary">Action Items</p>
          <p class="text-xs text-text-muted mt-0.5">
            Tasks, owners, and deadlines
          </p>
        </div>
      </label>

      <label class="card flex items-center gap-3 p-4 cursor-pointer">
        <input
          type="radio"
          name="summary-type"
          value="meeting"
          class="accent-accent scale-125"
        />
        <div>
          <p class="text-sm font-medium text-text-primary">Meeting Notes</p>
          <p class="text-xs text-text-muted mt-0.5">Structured meeting recap</p>
        </div>
      </label>
    </div>
  </div>

  <div>
    <label class="label-text">Length</label>

    <div class="flex flex-wrap items-center gap-3 mt-2">
      <label class="card flex items-center gap-2 px-4 py-2.5 cursor-pointer">
        <input
          type="radio"
          name="summary-length"
          value="short"
          class="accent-accent scale-125"
        />
        <span class="text-sm text-text-primary">Short</span>
      </label>

      <label
        class="card flex items-center gap-2 px-4 py-2.5 cursor-pointer border-accent/50 bg-accent/5"
      >
        <input
          type="radio"
          name="summary-length"
          value="medium"
          class="accent-accent scale-125"
          checked
        />
        <span class="text-sm text-text-primary">Medium</span>
      </label>

      <label class="card flex items-center gap-2 px-4 py-2.5 cursor-pointer">
        <input
          type="radio"
          name="summary-length"
          value="long"
          class="accent-accent scale-125"
        />
        <span class="text-sm text-text-primary">Long</span>
      </label>
    </div>
  </div>

  <div class="pt-2">
    <button type="button" class="btn-primary px-6">
      <i data-lucide="sparkles" class="h-4 w-4"></i>
      Generate Summary
    </button>
  </div>
</form>
