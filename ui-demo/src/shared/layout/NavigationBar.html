<header

        type="button"
        class="btn-ghost hidden sm:inline-flex"

      <button

        class="btn-ghost lg:hidden"
        aria-label="Open menu"
        aria-expanded="false"
      >
        <i data-lucide="menu" class="h-5 w-5"></i>
