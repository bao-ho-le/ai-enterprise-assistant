<div class="flex gap-4 {{ALIGNMENT}}">
  <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full {{AVATAR_BG}}">
    <i data-lucide="{{ICON}}" class="h-4 w-4 {{ICON_COLOR}}"></i>
  </div>
  <div class="flex-1 min-w-0 {{MESSAGE_WIDTH}}">
    <div class="rounded-xl px-4 py-3 {{BUBBLE_BG}} border {{BUBBLE_BORDER}}">
      <p class="text-sm text-text-primary leading-relaxed">{{CONTENT}}</p>
    </div>
    <p class="text-xs text-text-muted mt-1.5 px-1">{{TIMESTAMP}}</p>
  </div>
</div>
