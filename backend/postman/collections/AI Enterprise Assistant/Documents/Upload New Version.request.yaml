$kind: http-request
method: POST
url: '{{baseUrl}}/api/v1/documents/{{documentId}}/versions'
order: 2000
description: Upload a new version of an existing document.
body:
  type: formdata
  content:
    - key: file
      type: file
      src: ''
      description: The new version file
    - key: request
      type: text
      value: '{"changeNote": "Updated content in section 2"}'
      description: JSON object with changeNote field
