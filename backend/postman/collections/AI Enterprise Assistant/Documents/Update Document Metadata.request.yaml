$kind: http-request
method: PUT
url: '{{baseUrl}}/api/v1/documents/{{documentId}}'
order: 3000
description: 'Update the metadata (title, description, documentType) of an existing document.'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "title": "Updated Title",
      "description": "Updated description",
      "documentType": "CONTRACT"
    }
