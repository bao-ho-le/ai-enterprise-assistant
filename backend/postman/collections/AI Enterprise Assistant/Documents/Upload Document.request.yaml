$kind: http-request
name: Upload Document
method: POST
url: "{{baseUrl}}/api/v1/documents/upload"
order: 1000
description: Upload a new document. The request part is a JSON object with title, description, and documentType.
body:
  type: formdata
  content:
    - type: text
      key: request
      value: '{"title": "My Document", "description": "A sample document", "documentType": "REPORT"}'
      contentType: application/json
      description: "JSON object with title, description, and documentType. Enum values: EMAIL_TEMPLATE, REPORT, MEETING_MINUTES, CONTRACT, FORM, OTHER"
      disabled: false
    - type: file
      key: file
      src:
        - /C:/Users/trand/Downloads/email_placeholder_template.pdf
      description: The document file to upload
      disabled: false
