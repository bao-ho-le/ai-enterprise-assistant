spring.application.name=backend
api.prefix=/api/v1


# ===============================
# Database connection
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/enterprise_ai_assistant
spring.datasource.username=levo
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver


# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


# ===============================
# File Upload Configuration
# ===============================
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
file.upload.max-size=500MB


# ===============================
# MinIO Configuration
# ===============================
minio.provider=MINIO
minio.endpoint=http://localhost:9000
minio.access-key=root
minio.secret-key=levo1702Ss!!
#minio.access-key=minioadmin
#minio.secret-key=minioadmin123
minio.bucket=files



# ===============================
# Qdrant Configuration
# ===============================
qdrant.host=localhost
qdrant.grpc-port=6334
qdrant.rest-port=6333
qdrant.collection-name=document_chunks
qdrant.vector-size=3072
# Cosine similarity toi thieu de 1 ket qua duoc coi la lien quan (0..1). Can tune thuc nghiem.
qdrant.score-threshold=0.65
qdrant.use-tls=false
qdrant.api-key=


